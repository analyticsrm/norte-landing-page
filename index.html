<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Norte — Tráfego pago e sites que convertem</title>
  <meta name="description" content="Agência de tráfego pago e criação de sites. Um time só entre quem atrai e quem converte." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       Design System — Colors & Type
    ============================================================ */
    :root {
      --color-grafite:    #1A1A1A;
      --color-laranja:    #FF4D00;
      --color-offwhite:   #F8F6F2;
      --color-branco:     #FFFFFF;
      --color-neutro-700: #3E3E3B;
      --color-neutro-500: #8C8882;
      --color-neutro-300: #D4D0CB;
      --color-neutro-100: #F0EDE8;
      --color-laranja-600:#CC3D00;
      --color-laranja-300:#FF7340;
      --color-laranja-200:#FFB090;
      --color-laranja-50: #FFE8DC;
      --color-erro:       #CC2B2B;
      --fg-1:      var(--color-grafite);
      --fg-2:      var(--color-neutro-700);
      --fg-3:      var(--color-neutro-500);
      --bg-page:   var(--color-offwhite);
      --bg-surface:var(--color-branco);
      --bg-soft:   var(--color-neutro-100);
      --bg-dark:   var(--color-grafite);
      --border:    var(--color-neutro-300);
      --accent:    var(--color-laranja);
      --font-sans: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      --text-display: 64px;
      --text-h1: 48px; --text-h2: 36px; --text-h3: 28px;
      --text-h4: 22px; --text-body-lg: 18px; --text-body: 16px;
      --text-body-sm: 14px; --text-label: 12px;
      --w-regular:400; --w-medium:500; --w-semi:600; --w-bold:700;
      --lh-tight:1.1; --lh-h:1.2; --lh-prose:1.6;
      --sp-4:4px; --sp-8:8px; --sp-12:12px; --sp-16:16px;
      --sp-24:24px; --sp-32:32px; --sp-48:48px; --sp-64:64px; --sp-96:96px;
      --radius-sm:4px; --radius-md:8px; --radius-lg:12px;
      --radius-xl:16px; --radius-2xl:24px; --radius-full:999px;
      --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    /* ============================================================
       Base
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: var(--font-sans);
      background: var(--bg-page);
      color: var(--fg-1);
      font-size: 16px;
      line-height: var(--lh-prose);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
      overflow-x: clip;   /* clip (não hidden) p/ não criar scroll-container e quebrar position:sticky */
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: var(--font-sans); cursor: pointer; }
    ::selection { background: var(--color-laranja); color: #fff; }
    h1,h2,h3,h4,h5,h6 { margin: 0; }
    p { margin: 0; }
    ul { margin: 0; padding: 0; list-style: none; }

    /* ============================================================
       Layout
    ============================================================ */
    .container {
      width: 100%; max-width: 1440px;
      margin: 0 auto; padding: 0 80px;
    }
    @media (max-width: 1280px) { .container { padding: 0 40px; } }
    @media (max-width: 768px)  { .container { padding: 0 24px; } }
    .section-pad { padding: 128px 0; }
    @media (max-width: 768px) { .section-pad { padding: 80px 0; } }

    /* ============================================================
       Reveal animations
    ============================================================ */
    .reveal {
      opacity: 0;
      transform: translateY(44px) rotate(-1.2deg) scale(0.96);
      will-change: opacity, transform;
    }
    .reveal.is-visible { animation: revealIn 800ms cubic-bezier(0.22,0.61,0.36,1) forwards; }
    @keyframes revealIn { to { opacity:1; transform: translateY(0) rotate(0) scale(1); } }
    .reveal[data-delay="1"].is-visible { animation-delay: 100ms; }
    .reveal[data-delay="2"].is-visible { animation-delay: 200ms; }
    .reveal[data-delay="3"].is-visible { animation-delay: 300ms; }
    .reveal[data-delay="4"].is-visible { animation-delay: 400ms; }

    .reveal-l { opacity:0; transform: translateX(-72px) rotate(-3deg) scale(0.95); }
    .reveal-l.is-visible { animation: revealLeftIn 800ms cubic-bezier(0.22,0.61,0.36,1) forwards; }
    @keyframes revealLeftIn { to { opacity:1; transform: translateX(0) rotate(0) scale(1); } }
    .reveal-r { opacity:0; transform: translateX(72px) rotate(3deg) scale(0.95); }
    .reveal-r.is-visible { animation: revealRightIn 800ms cubic-bezier(0.22,0.61,0.36,1) forwards; }
    @keyframes revealRightIn { to { opacity:1; transform: translateX(0) rotate(0) scale(1); } }
    .reveal-l[data-delay="1"].is-visible, .reveal-r[data-delay="1"].is-visible { animation-delay:100ms; }
    .reveal-l[data-delay="2"].is-visible, .reveal-r[data-delay="2"].is-visible { animation-delay:200ms; }
    .reveal-l[data-delay="3"].is-visible, .reveal-r[data-delay="3"].is-visible { animation-delay:300ms; }
    .reveal-l[data-delay="4"].is-visible, .reveal-r[data-delay="4"].is-visible { animation-delay:400ms; }

    @keyframes fadeRise { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .fade-rise         { animation: fadeRise 800ms var(--ease-out) both; }
    .fade-rise-delay-2 { animation: fadeRise 800ms var(--ease-out) 400ms both; }
    .fade-rise-delay-3 { animation: fadeRise 800ms var(--ease-out) 600ms both; }
    .fade-rise-delay-4 { animation: fadeRise 800ms var(--ease-out) 800ms both; }

    /* scroll-driven (modern browsers) */
    @supports (animation-timeline: view()) {
      /* Base rules (1 class — aplicam o scroll-driven) */
      .scroll-through {
        opacity:0; transform:none;
        animation: scrollThroughIn linear both, scrollThroughOut linear both;
        animation-timeline: view(), view();
        animation-range: entry 0% cover 22%, exit 30% exit 100%;
      }
      .scroll-through-l {
        opacity:0; transform:none;
        animation: scrollThroughInLeft linear both, scrollThroughExitLeft linear both;
        animation-timeline: view(), view();
        animation-range: entry 0% cover 28%, exit 0% exit 100%;
      }
      .scroll-through-r {
        opacity:0; transform:none;
        animation: scrollThroughInRight linear both, scrollThroughExitRight linear both;
        animation-timeline: view(), view();
        animation-range: entry 0% cover 28%, exit 0% exit 100%;
      }
      /* Regras .is-visible (2 classes — mesma especificidade que .reveal.is-visible,
         mas declaradas depois, então ganham no cascade e restauram o view() timeline
         que o shorthand animation de revealIn teria resetado) */
      .scroll-through.is-visible {
        animation: scrollThroughIn linear both, scrollThroughOut linear both;
        animation-timeline: view(), view();
        animation-range: entry 0% cover 22%, exit 30% exit 100%;
      }
      .scroll-through-l.is-visible {
        animation: scrollThroughInLeft linear both, scrollThroughExitLeft linear both;
        animation-timeline: view(), view();
        animation-range: entry 0% cover 28%, exit 0% exit 100%;
      }
      .scroll-through-r.is-visible {
        animation: scrollThroughInRight linear both, scrollThroughExitRight linear both;
        animation-timeline: view(), view();
        animation-range: entry 0% cover 28%, exit 0% exit 100%;
      }
    }
    @keyframes scrollThroughIn {
      from { opacity:0; transform: translateY(100px) rotate(-2deg) scale(0.86); }
      to   { opacity:1; transform:translateY(0) rotate(0) scale(1); }
    }
    @keyframes scrollThroughOut {
      from { opacity:1; transform:translateY(0) scale(1) rotate(0); }
      to   { opacity:0; transform:translateY(-56px) scale(0.9) rotate(-1.5deg); }
    }
    @keyframes scrollThroughInLeft {
      from { opacity:0; transform: translateX(-200px) rotate(-7deg) scale(0.86); }
      to   { opacity:1; transform:translateX(0) rotate(0) scale(1); }
    }
    @keyframes scrollThroughInRight {
      from { opacity:0; transform: translateX(200px) rotate(7deg) scale(0.86); }
      to   { opacity:1; transform:translateX(0) rotate(0) scale(1); }
    }
    /* Saída diagonal descontraída — cada card voa pro seu lado */
    @keyframes scrollThroughExitLeft {
      from { opacity:1; transform:translateX(0) translateY(0) rotate(0deg) scale(1); }
      to   { opacity:0; transform:translateX(-340px) translateY(60px) rotate(-14deg) scale(0.76); }
    }
    @keyframes scrollThroughExitRight {
      from { opacity:1; transform:translateX(0) translateY(0) rotate(0deg) scale(1); }
      to   { opacity:0; transform:translateX(340px) translateY(60px) rotate(14deg) scale(0.76); }
    }

    /* word stagger */
    .split-words { display: inline; }
    .split-words .word {
      display: inline-block;
      opacity: 0;
      transform: translateY(60px) scale(0.9);
      filter: blur(8px);
      transition: opacity 900ms var(--ease-out), transform 900ms var(--ease-out), filter 700ms var(--ease-out);
    }
    .split-words.is-visible .word { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }

    /* ============================================================
       Scroll progress
    ============================================================ */
    .scroll-progress {
      position: fixed; top:0; left:0; height:2px; width:0%;
      background: var(--color-laranja); z-index:60;
      transition: width 80ms linear; pointer-events:none;
    }

    /* ============================================================
       Nav
    ============================================================ */
    .nav {
      position: fixed; top:0; left:0; right:0; z-index:50;
      background: var(--bg-page);
      border-bottom: 0.5px solid transparent;
      transition: border-color 120ms var(--ease-out);
    }
    .nav.scrolled { border-bottom-color: var(--border); }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 80px; max-width:1440px; margin:0 auto;
    }
    @media (max-width:1280px) { .nav-inner { padding:18px 40px; } }
    @media (max-width:768px)  { .nav-inner { padding:14px 24px; } }
    .nav-logo { display:flex; align-items:center; height:28px; }
    .nav-logo img { height:28px; display:block; }
    .nav-links { display:flex; gap:32px; align-items:center; }
    .nav-links a { font-size:14px; font-weight:500; color:var(--fg-2); transition:color 120ms; position:relative; }
    .nav-links a:hover { color:var(--fg-1); }
    .nav-links a.active { color:var(--fg-1); }
    .nav-links a.active::after {
      content:""; position:absolute; left:0; right:0; bottom:-6px;
      height:1px; background:var(--color-laranja);
    }
    @media (max-width:920px) { .nav-links { display:none; } }
    .nav-cta {
      background: var(--color-grafite); color:#fff;
      font-weight:600; font-size:13px; letter-spacing:.01em;
      padding:10px 18px; border-radius:var(--radius-full); border:0;
      transition: transform 120ms, background 120ms;
    }
    .nav-cta:hover { background:var(--color-laranja); transform:translateY(-1px); }

    /* ============================================================
       Buttons
    ============================================================ */
    .btn {
      display:inline-flex; align-items:center; gap:10px;
      font-family:var(--font-sans); font-weight:600; font-size:15px;
      border:0; border-radius:var(--radius-full); padding:16px 28px;
      transition: background 150ms, color 150ms, border-color 150ms,
                  transform 260ms cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 260ms var(--ease-out);
      cursor:pointer; letter-spacing:-.005em;
    }
    .btn.primary { background:var(--color-laranja); color:#fff; }
    .btn.primary:hover {
      background:var(--color-laranja-600);
      transform:translateY(-3px) scale(1.04);
      box-shadow: 0 8px 28px rgba(255,77,0,.35), 0 2px 8px rgba(255,77,0,.2);
    }
    .btn.secondary { background:transparent; color:var(--fg-1); border:.5px solid var(--color-grafite); }
    .btn.secondary:hover { background:var(--color-laranja); color:#fff; border-color:var(--color-laranja); transform:translateY(-2px); }
    .btn-arrow { display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; transition:transform 120ms; }
    .btn:hover .btn-arrow { transform:translateX(3px); }

    /* hero button overrides */
    .hero .btn.secondary { color:var(--color-offwhite); border-color:rgba(248,246,242,.4); }
    .hero .btn.secondary:hover { background:rgba(248,246,242,.1); border-color:var(--color-offwhite); color:var(--color-offwhite); }

    /* ============================================================
       Section labels
    ============================================================ */
    .section-label {
      display:inline-flex; align-items:center; gap:10px;
      font-size:12px; font-weight:600; text-transform:uppercase;
      letter-spacing:.08em; color:var(--color-laranja); margin-bottom:28px;
    }
    .section-label .tri {
      display:inline-block; width:8px; height:8px;
      background:var(--color-laranja); clip-path:polygon(50% 0,100% 100%,0 100%);
    }
    .section-title {
      font-family:var(--font-sans);
      font-size: clamp(36px,5vw,64px);
      font-weight:600; line-height:1.05; letter-spacing:-.02em;
      color:var(--fg-1); margin:0 0 24px; text-wrap:balance;
    }
    .section-sub {
      font-size:18px; line-height:1.55; color:var(--fg-2);
      max-width:640px; margin:0;
    }
    .dark-section { background:var(--color-grafite); color:var(--color-offwhite); }
    .dark-section .section-title { color:var(--color-offwhite); }
    .dark-section .section-sub   { color:var(--color-neutro-300); }
    .dark-section .section-label { color:var(--color-laranja); }

    /* ============================================================
       HERO
    ============================================================ */
    .hero {
      position:relative; min-height:100vh; width:100%;
      overflow:hidden;
      /* Fundo do hero faz grafite → transparente, revelando o offwhite da página */
      background: linear-gradient(to bottom,
        var(--color-grafite) 0%,
        var(--color-grafite) 76%,
        rgba(26,26,26,.6) 87%,
        rgba(26,26,26,.12) 95%,
        transparent 100%);
    }
    .hero-video-wrap {
      position:absolute; inset:0; z-index:0; overflow:hidden;
      background:var(--color-grafite); will-change:transform;
      /* Mask só no wrap: vídeo some, scroll-cue fica fora e totalmente visível */
      -webkit-mask-image: linear-gradient(to bottom,
        black 0%, black 76%,
        rgba(0,0,0,.65) 87%,
        rgba(0,0,0,.18) 95%,
        transparent 100%);
      mask-image: linear-gradient(to bottom,
        black 0%, black 76%,
        rgba(0,0,0,.65) 87%,
        rgba(0,0,0,.18) 95%,
        transparent 100%);
    }
    .hero-video {
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:cover; opacity:0;
      filter:contrast(1.05) saturate(0.85);
    }
    .hero-video-overlay {
      position:absolute; inset:0;
      background: linear-gradient(to bottom,
        rgba(26,26,26,.55) 0%, rgba(26,26,26,.20) 18%,
        rgba(26,26,26,.15) 55%, rgba(26,26,26,.45) 100%);
      pointer-events:none;
    }
    .hero-fade-bottom { display: none; }
    .hero-content {
      position:relative; z-index:2;
      padding-top: calc(8rem - 12px); padding-bottom:160px;
      display:flex; flex-direction:column; align-items:center; text-align:center;
    }
    .hero-headline {
      font-family:var(--font-sans); font-weight:500;
      font-size: clamp(48px,9vw,128px);
      line-height:.95; letter-spacing:-.035em;
      color:var(--color-offwhite); max-width:1200px; margin:0; text-wrap:balance;
    }
    .hero-headline .accent { color:var(--color-laranja); font-weight:500; }
    .hero-desc {
      font-size: clamp(16px,1.4vw,19px); line-height:1.55;
      color:var(--color-offwhite); max-width:560px; margin:32px auto 0;
    }
    .hero-actions {
      display:flex; gap:12px; margin-top:44px; flex-wrap:wrap; justify-content:center;
    }
    .hero-meta {
      display:flex; gap:48px; margin-top:100px; flex-wrap:wrap; justify-content:center;
    }
    .hero-meta-item { display:flex; flex-direction:column; gap:4px; text-align:center; }
    .hero-meta-item .v {
      font-size:28px; font-weight:600; letter-spacing:-.02em; color:var(--color-offwhite);
    }
    .hero-meta-item .l {
      font-size:11px; text-transform:uppercase; letter-spacing:.08em;
      color:rgba(248,246,242,.65); font-weight:600;
    }
    .scroll-cue {
      position:absolute; bottom:32px; left:50%; transform:translateX(-50%);
      z-index:3; font-size:10px; text-transform:uppercase; letter-spacing:.15em;
      color:var(--color-grafite); font-weight:600;
      display:flex; flex-direction:column; align-items:center; gap:10px;
    }
    .scroll-cue::after {
      content:""; width:1px; height:32px;
      background:linear-gradient(to bottom, var(--color-grafite), transparent);
      animation: cueDrop 2.4s var(--ease-out) infinite;
    }
    @keyframes cueDrop {
      0%  { transform:scaleY(0); transform-origin:top; }
      50% { transform:scaleY(1); transform-origin:top; }
      51% { transform-origin:bottom; }
      100%{ transform:scaleY(0); transform-origin:bottom; }
    }

    /* ============================================================
       Marquee
    ============================================================ */
    .marquee {
      background:var(--bg-page); overflow:hidden; padding:24px 0;
      border-bottom:.5px solid var(--border);
    }
    .marquee-track {
      display:flex; gap:64px; white-space:nowrap;
      animation: marquee 24s linear infinite; width:max-content;
    }
    @keyframes marquee { from { transform:translateX(0); } to { transform:translateX(-50%); } }
    .marquee-item {
      font-size: clamp(28px,4vw,56px); font-weight:500; letter-spacing:-.02em;
      color:var(--fg-1); display:flex; align-items:center; gap:64px;
    }
    .marquee-item .sep {
      display:inline-block; width:18px; height:18px;
      background:var(--color-laranja); clip-path:polygon(50% 0,100% 100%,0 100%);
    }
    .marquee-item.muted { color:var(--fg-3); }

    /* ============================================================
       Serviços
    ============================================================ */
    .services-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:64px;
    }
    @media (max-width:920px) { .services-grid { grid-template-columns:1fr; } }
    .service-card {
      background:var(--bg-surface); border:.5px solid var(--border);
      border-radius:var(--radius-2xl); padding:48px;
      display:flex; flex-direction:column; gap:24px;
      min-height:540px;
      transition: transform 320ms cubic-bezier(0.34,1.56,0.64,1),
                  border-color 150ms var(--ease-out),
                  box-shadow 320ms var(--ease-out);
    }
    .service-card:hover {
      border-color:var(--color-neutro-300);
      transform:translateY(-12px) rotate(-0.5deg);
      box-shadow: 0 24px 64px rgba(26,26,26,.09), 0 4px 16px rgba(26,26,26,.05);
    }
    .service-card .number { font-size:13px; font-weight:600; color:var(--fg-3); letter-spacing:.08em; }
    .service-card h3 { font-size:36px; font-weight:600; letter-spacing:-.02em; line-height:1.1; color:var(--fg-1); }
    .service-card p.lead { font-size:17px; line-height:1.6; color:var(--fg-2); }
    .service-card .feats {
      display:grid; grid-template-columns:1fr 1fr; gap:12px 24px;
      margin-top:auto; padding-top:24px; border-top:.5px solid var(--border);
    }
    .service-card .feats li { font-size:14px; color:var(--fg-1); display:flex; align-items:center; gap:8px; }
    .service-card .feats li::before {
      content:""; width:6px; height:6px; background:var(--color-laranja);
      clip-path:polygon(50% 0,100% 100%,0 100%); flex-shrink:0;
    }
    .service-card .visual {
      height:140px; position:relative; border-radius:var(--radius-lg);
      overflow:hidden; background:var(--color-offwhite); border:.5px solid var(--border);
    }
    .svc-traffic { position:absolute; inset:0; display:flex; align-items:flex-end; padding:16px; gap:4px; }
    .svc-traffic .bar { flex:1; background:var(--color-grafite); border-radius:2px 2px 0 0; }
    .svc-traffic .bar.hl { background:var(--color-laranja); }
    .svc-site { position:absolute; inset:0; padding:16px; }
    .svc-site .browser {
      background:#fff; border-radius:8px; border:.5px solid var(--border);
      height:100%; display:flex; flex-direction:column; overflow:hidden;
    }
    .svc-site .browser-bar { display:flex; gap:4px; padding:8px; border-bottom:.5px solid var(--border); }
    .svc-site .browser-bar i { width:8px; height:8px; border-radius:50%; background:var(--color-neutro-300); }
    .svc-site .browser-body { flex:1; padding:12px; display:flex; flex-direction:column; gap:6px; }
    .svc-site .row { height:6px; background:var(--color-neutro-100); border-radius:2px; }
    .svc-site .row.w70 { width:70%; }
    .svc-site .row.w40 { width:40%; background:var(--color-laranja); height:8px; }
    .svc-site .row.w90 { width:90%; }
    .svc-site .row.w50 { width:50%; }

    /* ============================================================
       Processo
    ============================================================ */
    .process-grid {
      display:grid; grid-template-columns:repeat(4,1fr); gap:0; margin-top:64px;
      border-top:.5px solid var(--color-neutro-700); border-left:.5px solid var(--color-neutro-700);
    }
    @media (max-width:920px) { .process-grid { grid-template-columns:1fr 1fr; } }
    @media (max-width:560px) { .process-grid { grid-template-columns:1fr; } }
    .process-step {
      padding:40px 28px; border-right:.5px solid var(--color-neutro-700);
      border-bottom:.5px solid var(--color-neutro-700);
      display:flex; flex-direction:column; gap:16px; min-height:280px;
    }
    .process-step .step-tri {
      width:10px; height:10px; flex-shrink:0;
      background:var(--color-laranja);
      clip-path:polygon(0 0, 100% 50%, 0 100%);
    }
    .process-step h4 { font-size:22px; font-weight:600; letter-spacing:-.01em; color:var(--color-offwhite); }
    .process-step p  { font-size:14px; line-height:1.55; color:var(--color-neutro-300); }
    .process-step .when { margin-top:auto; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--color-neutro-500); font-weight:600; }

    /* ============================================================
       Cases
    ============================================================ */
    .cases-grid {
      display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; margin-top:64px;
    }
    @media (max-width:1100px) { .cases-grid { grid-template-columns:1fr 1fr; } }
    @media (max-width:720px)  { .cases-grid { grid-template-columns:1fr; } }
    .case-card {
      background:var(--bg-surface); border:.5px solid var(--border);
      border-radius:var(--radius-2xl); padding:32px;
      display:flex; flex-direction:column; gap:20px; min-height:420px;
      transition: transform 320ms cubic-bezier(0.34,1.56,0.64,1),
                  border-color 150ms var(--ease-out),
                  box-shadow 320ms var(--ease-out);
    }
    .case-card:hover {
      border-color:var(--color-grafite);
      transform:translateY(-10px) rotate(0.5deg);
      box-shadow: 0 20px 56px rgba(26,26,26,.08), 0 3px 12px rgba(26,26,26,.04);
    }
    .case-card .meta-row {
      display:flex; justify-content:space-between; align-items:center;
      font-size:11px; text-transform:uppercase; letter-spacing:.08em; font-weight:600; color:var(--fg-3);
    }
    .case-card .stat {
      font-size: clamp(48px,6vw,72px); font-weight:500; letter-spacing:-.04em;
      line-height:1; color:var(--fg-1); margin-top:8px;
    }
    .case-card .stat .suffix { color:var(--color-laranja); }
    .case-card .stat-label { font-size:15px; line-height:1.45; color:var(--fg-2); }
    .case-card .case-footer {
      margin-top:auto; padding-top:24px; border-top:.5px solid var(--border);
      display:flex; flex-direction:column; gap:6px;
    }
    .case-card .case-footer .name { font-size:15px; font-weight:600; color:var(--fg-1); }
    .case-card .case-footer .desc { font-size:13px; color:var(--fg-3); line-height:1.5; }

    /* Números (Cases) — efeito de PIN:
       a Processo (escura) fica fixa preenchendo a tela ("página parada")
       e a Cases sobe por cima dela ("a seção se move"); quando a Cases
       cobre a tela, a Processo libera e o site segue normal para a Stack.
       - .overlap-stage: bloco de referência do sticky + contexto de
         empilhamento (isolation) p/ a Processo fixa não vazar nas seções
         seguintes.
       - Processo: sticky topo, min 100vh (preenche a tela), z-index 1.
       - Cases: relativa z-index 2 (passa POR CIMA), 100vh, fundo opaco.
       - O blur do card (entra borrado, foca no centro, sai nítido) é
         controlado em useNumbersCard. Mobile (<=768px): sem pin. */
    .overlap-stage { position:relative; isolation:isolate; }
    .overlap-stage #processo {
      position:sticky; top:0;
      min-height:100vh;
      z-index:1;
    }
    .numbers-section {
      position:relative; z-index:2;
      min-height:100vh;
      background:transparent;   /* sobe SÓ o card sobre a Processo escura; o offwhite volta na Stack */
      display:flex; align-items:center;
      padding:80px 40px;
    }
    @media (max-width:768px) {
      .overlap-stage #processo { position:static; min-height:0; }
      .numbers-section { position:static; min-height:0; display:block; padding:0 16px 80px; }
    }
    .numbers-card {
      width:100%; max-width:1360px; margin:0 auto;
      background:var(--color-branco);
      border-radius:28px;
      box-shadow:0 40px 90px -28px rgba(26,26,26,.38),
                 0 12px 36px -16px rgba(26,26,26,.18);
      will-change:filter;
      filter:blur(14px);   /* estado inicial; JS assume no scroll */
    }
    .numbers-card-inner { padding:96px 72px; }
    @media (max-width:920px) { .numbers-card-inner { padding:72px 40px; } }
    @media (max-width:768px) { .numbers-card-inner { padding:56px 24px; } .numbers-card { border-radius:20px; filter:none; } }

    /* ============================================================
       Stack
    ============================================================ */
    /* Respiro acima do título da Stack (após a transição Números). Menor no mobile. */
    #stack { padding-top:160px; }
    @media (max-width:768px) { #stack { padding-top:88px; } }
    .stack-grid {
      display:grid; grid-template-columns:repeat(4,1fr);
      margin-top:64px; gap:8px;
    }
    @media (max-width:920px) { .stack-grid { grid-template-columns:repeat(3,1fr); } }
    @media (max-width:600px) { .stack-grid { grid-template-columns:repeat(2,1fr); } }
    .stack-cell {
      padding:36px 24px; display:flex; flex-direction:column; align-items:flex-start;
      gap:12px; min-height:160px; background:var(--bg-page);
      border-radius:var(--radius-xl);
      border: .5px solid var(--border);
      transition: background 150ms var(--ease-out),
                  border-color 150ms var(--ease-out),
                  transform 280ms cubic-bezier(0.34,1.56,0.64,1);
    }
    .stack-cell:hover { background:var(--bg-surface); border-color:var(--color-neutro-300); transform:translateY(-3px); }
    .stack-cell.lit   { background:var(--bg-surface); }
    .stack-cell .icon { width:32px; height:32px; display:flex; align-items:center; justify-content:center; color:var(--fg-1); }
    .stack-cell .name { font-size:16px; font-weight:600; color:var(--fg-1); letter-spacing:-.01em; }
    .stack-cell .cat  { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--fg-3); margin-top:auto; font-weight:600; }

    /* ============================================================
       Sobre
    ============================================================ */
    /* O vídeo cobre todo o fundo da seção, ancorado embaixo à direita.
       Sem blend e sem fundo escuro: uma máscara radial mostra o vídeo
       em cor cheia só no canto inferior direito (o brilho) e o dissolve
       em direção ao topo/esquerda, revelando o offwhite da seção. Assim
       a seção permanece clara/on-brand e o texto mantém contraste. */
    /* A máscara fica no wrapper (não transformado); o zoom no vídeo é
       ancorado no canto inferior direito para o laranja dominar e
       empurrar o azul pra fora da área visível. */
    .sobre-video-wrap {
      position:absolute; inset:0;
      z-index:0;
      overflow:hidden;
      pointer-events:none;
      -webkit-mask-image: radial-gradient(ellipse 66% 72% at 100% 100%,
        #000 0%, #000 20%, rgba(0,0,0,.5) 46%, transparent 68%);
      mask-image: radial-gradient(ellipse 66% 72% at 100% 100%,
        #000 0%, #000 20%, rgba(0,0,0,.5) 46%, transparent 68%);
    }
    .sobre-deco-video {
      display:block;
      width:100%; height:100%;
      object-fit:cover;
      object-position:right bottom;
      transform:scale(1.5);
      transform-origin:100% 100%;
    }
    #sobre .container { position:relative; z-index:1; }
    /* Mobile: a lista (1 coluna) fica por cima do vídeo; suaviza o vídeo
       para o texto manter contraste. */
    @media (max-width:768px) { .sobre-deco-video { opacity:.45; } }
    .about-grid { display:grid; grid-template-columns:1fr 1.4fr; gap:80px; align-items:start; }
    @media (max-width:920px) { .about-grid { grid-template-columns:1fr; gap:40px; } }
    .about-statement {
      font-size: clamp(28px,3.4vw,44px); font-weight:400; line-height:1.2;
      letter-spacing:-.02em; color:var(--fg-1); text-wrap:balance;
    }
    .about-statement em { font-style:normal; color:var(--color-laranja); }
    .sticky-aside { position:sticky; top:120px; align-self:start; }
    @media (max-width:920px) { .sticky-aside { position:static; } }
    .about-list { display:flex; flex-direction:column; border-top:.5px solid var(--border); }
    .about-list-item { display:grid; grid-template-columns:40px 1fr; gap:24px; padding:28px 0; border-bottom:.5px solid var(--border); }
    .about-list-item .k { font-size:13px; font-weight:600; color:var(--color-laranja); letter-spacing:.06em; }
    .about-list-item .v { font-size:17px; line-height:1.55; color:var(--fg-1); }
    .about-list-item .v strong { font-weight:600; }

    /* ============================================================
       Depoimentos
    ============================================================ */
    .testimonials-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; margin-top:64px; }
    @media (max-width:920px) { .testimonials-grid { grid-template-columns:1fr; } }
    .testimonial {
      background:var(--color-neutro-100); border-radius:var(--radius-2xl); padding:36px;
      display:flex; flex-direction:column; gap:28px;
      transition: transform 320ms cubic-bezier(0.34,1.56,0.64,1), box-shadow 320ms var(--ease-out);
    }
    .testimonial:hover {
      transform:translateY(-8px) rotate(-0.4deg);
      box-shadow: 0 16px 48px rgba(26,26,26,.07);
    }
    .testimonial .quote { font-size:19px; line-height:1.45; color:var(--fg-1); font-weight:400; letter-spacing:-.01em; }
    .testimonial .quote-mark { font-family:'Georgia',serif; font-size:48px; line-height:0; color:var(--color-laranja); display:block; margin-bottom:8px; margin-top:12px; }
    .testimonial .person { display:flex; align-items:center; gap:14px; }
    .testimonial .avatar {
      width:44px; height:44px; border-radius:50%;
      background:var(--bg-surface); border:.5px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:600; color:var(--fg-1); flex-shrink:0;
    }
    .testimonial .person-meta { display:flex; flex-direction:column; gap:2px; }
    .testimonial .person-meta .name { font-size:14px; font-weight:600; color:var(--fg-1); }
    .testimonial .person-meta .role { font-size:12px; color:var(--fg-3); }

    /* ============================================================
       CTA Final
    ============================================================ */
    .cta-final {
      position:relative; min-height:720px; width:100%;
      overflow:hidden; background:var(--color-grafite); color:var(--color-offwhite);
    }
    .cta-final::before {
      content:""; position:absolute; width:800px; height:800px; left:-200px; top:40%;
      background:radial-gradient(circle,rgba(255,77,0,.35) 0%,rgba(255,77,0,0) 60%);
      z-index:1; pointer-events:none; animation:blobFloat 14s ease-in-out infinite alternate;
      filter:blur(40px);
    }
    .cta-final::after {
      content:""; position:absolute; width:600px; height:600px; right:-100px; bottom:-100px;
      background:radial-gradient(circle,rgba(255,77,0,.25) 0%,rgba(255,77,0,0) 60%);
      z-index:1; pointer-events:none; animation:blobFloat 18s ease-in-out -6s infinite alternate;
      filter:blur(50px);
    }
    @keyframes blobFloat { from { transform:translate(-60px,-80px) scale(.8); } to { transform:translate(80px,60px) scale(1.2); } }
    .cta-final-video-wrap { position:absolute; inset:0; z-index:0; overflow:hidden; }
    .cta-final-video { width:100%; height:100%; object-fit:cover; opacity:.32; filter:contrast(1.1) saturate(.6) brightness(.7); }
    .cta-final-overlay {
      position:absolute; inset:0;
      background:linear-gradient(to bottom,rgba(26,26,26,.6) 0%,rgba(26,26,26,.3) 40%,rgba(26,26,26,.5) 80%,rgba(26,26,26,.95) 100%);
      pointer-events:none;
    }
    /* só vertical: o padding horizontal vem do .container (senão o
       shorthand zeraria o lateral e o conteúdo encostaria nas bordas) */
    .cta-final-content { position:relative; z-index:2; padding-top:160px; padding-bottom:128px; }
    .cta-final-inner { display:grid; grid-template-columns:1.1fr 1fr; gap:96px; align-items:end; }
    @media (max-width:920px) { .cta-final-inner { grid-template-columns:1fr; gap:48px; } }
    .cta-final h2 { font-size:clamp(44px,6vw,88px); font-weight:500; line-height:.98; letter-spacing:-.03em; margin:0; color:var(--color-offwhite); }
    .cta-final h2 .accent { color:var(--color-laranja); }
    .cta-final > .cta-final-content p { font-size:17px; line-height:1.55; color:var(--color-neutro-300); margin:24px 0 0; max-width:480px; }
    .contact-form {
      background:rgba(248,246,242,.04); border:.5px solid rgba(248,246,242,.18);
      border-radius:var(--radius-2xl); padding:32px;
      display:flex; flex-direction:column; gap:16px;
      backdrop-filter:blur(10px);
    }
    .contact-form .row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media (max-width:600px) { .contact-form .row { grid-template-columns:1fr; } }
    /* min-width:0 deixa os itens do grid encolherem para o container
       (senão o size dos inputs força o 1fr a estourar e vazar a tela) */
    .cta-final-inner, .cta-final-inner > * { min-width:0; }
    .contact-form, .contact-form .row, .field { min-width:0; }
    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--color-neutro-300); }
    .field input, .field select, .field textarea {
      width:100%; min-width:0; max-width:100%; box-sizing:border-box;
      background:transparent; border:0; border-bottom:.5px solid rgba(248,246,242,.3);
      padding:8px 0; color:var(--color-offwhite); font-family:var(--font-sans);
      font-size:15px; font-weight:500; outline:none;
      transition:border-color 120ms;
    }
    .field input::placeholder, .field textarea::placeholder { color:var(--color-neutro-500); }
    .field input:focus, .field select:focus, .field textarea:focus { border-color:var(--color-laranja); }
    .field select option { background:var(--color-grafite); color:var(--color-offwhite); }
    .contact-form .submit { display:flex; gap:10px; margin-top:8px; align-items:center; }
    .contact-form .submit .btn { flex:1; justify-content:center; }
    .contact-form .wa {
      display:inline-flex; align-items:center; justify-content:center;
      background:transparent; border:.5px solid rgba(248,246,242,.3);
      color:var(--color-offwhite); padding:16px 18px;
      border-radius:var(--radius-full); font-size:13px; font-weight:600; gap:8px;
      transition:background 120ms, border-color 120ms; cursor:pointer;
    }
    .contact-form .wa:hover { background:rgba(248,246,242,.06); border-color:var(--color-offwhite); }
    .form-status { font-size:12px; color:var(--color-laranja-200); min-height:16px; }

    /* ============================================================
       Footer
    ============================================================ */
    .footer {
      background:var(--color-grafite); color:var(--color-offwhite);
      padding:80px 0 32px; border-top:.5px solid var(--color-neutro-700);
    }
    .footer-grid { display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr; gap:48px; margin-bottom:80px; }
    @media (max-width:920px) { .footer-grid { grid-template-columns:1fr 1fr; gap:40px; } }
    @media (max-width:560px) { .footer-grid { grid-template-columns:1fr; gap:32px; } }
    .footer h5 { font-size:11px; text-transform:uppercase; letter-spacing:.1em; font-weight:600; color:var(--color-neutro-500); margin:0 0 20px; }
    .footer ul { display:flex; flex-direction:column; gap:12px; }
    .footer a { color:var(--color-offwhite); font-size:14px; font-weight:500; transition:color 120ms; }
    .footer a:hover { color:var(--color-laranja); }
    .footer-tagline { font-size:18px; font-weight:400; color:var(--color-neutro-300); max-width:360px; line-height:1.5; margin:0 0 24px; }
    .footer-bottom {
      padding-top:32px; border-top:.5px solid var(--color-neutro-700);
      display:flex; justify-content:space-between; align-items:center;
      font-size:12px; color:var(--color-neutro-500); flex-wrap:wrap; gap:16px;
    }
    .footer-bigmark {
      font-size: clamp(80px,16vw,220px); font-weight:700; letter-spacing:-.03em;
      line-height:.9; color:var(--color-neutro-700); user-select:none; margin:32px 0 0; overflow:hidden;
    }
    .footer-bigmark span {
      display:inline-block;
      background:linear-gradient(120deg,var(--color-neutro-700) 0%,var(--color-laranja) 50%,var(--color-neutro-700) 100%);
      background-size:200% 100%; -webkit-background-clip:text; background-clip:text;
      -webkit-text-fill-color:transparent; animation:footerShine 6s linear infinite;
    }
    @keyframes footerShine { from { background-position:0% 50%; } to { background-position:200% 50%; } }
  </style>
</head>
<body data-animations="on" data-cinematic="on">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">
    // ============================================================
    // Hooks
    // ============================================================
    const { useState, useEffect, useRef, useCallback } = React;

    function useReveal() {
      useEffect(() => {
        const els = document.querySelectorAll('.reveal,.reveal-l,.reveal-r,.reveal-zoom,.reveal-up');
        if (!('IntersectionObserver' in window)) {
          els.forEach(el => el.classList.add('is-visible'));
          return;
        }
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('is-visible');
              io.unobserve(e.target);
            }
          });
        }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
        els.forEach(el => io.observe(el));
        return () => io.disconnect();
      }, []);
    }

    function useCounter(ref, target, { duration = 1600, suffix = '', prefix = '', decimals = 0 } = {}) {
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        let started = false;
        const fmt = (n) => {
          const fixed = decimals > 0 ? n.toFixed(decimals) : Math.round(n).toString();
          const [intPart, decPart] = fixed.split('.');
          const withSep = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
          return decPart ? `${withSep},${decPart}` : withSep;
        };
        const run = () => {
          const start = performance.now();
          const tick = (now) => {
            const t = Math.min(1, (now - start) / duration);
            const eased = 1 - Math.pow(1 - t, 3);
            el.textContent = prefix + fmt(target * eased) + suffix;
            if (t < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        };
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting && !started) { started = true; run(); io.unobserve(e.target); }
          });
        }, { threshold: 0.4 });
        io.observe(el);
        el.textContent = prefix + '0' + suffix;
        return () => io.disconnect();
      }, [target, duration, suffix, prefix, decimals]);
    }

    function useScrolled(threshold = 24) {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > threshold);
        onScroll();
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, [threshold]);
      return scrolled;
    }

    function useTestimonialsParallax() {
      useEffect(() => {
        const section = document.getElementById('depoimentos');
        if (!section) return;
        const cards = Array.from(section.querySelectorAll('.testimonial'));
        if (cards.length === 0) return;

        cards.forEach(card => { card.style.opacity = '0'; card.style.transform = 'none'; });

        const entered = new Set();
        const grid = section.querySelector('.testimonials-grid') || section;

        // Entrada: fade escalonado
        const entranceIO = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (!entry.isIntersecting) return;
            cards.forEach((card, i) => {
              if (entered.has(card)) return;
              entered.add(card);
              setTimeout(() => {
                card.style.transition = 'opacity 600ms cubic-bezier(0.22,0.61,0.36,1)';
                card.style.opacity    = '1';
                setTimeout(() => { card.style.transition = 'none'; }, 650);
              }, i * 110);
            });
            entranceIO.disconnect();
          });
        }, { threshold: 0.05 });

        entranceIO.observe(grid);

        // Saída: colapso para dentro + afunda
        // Card 0 (esq) → direita + baixo + gira CW
        // Card 1 (centro) → reto para baixo, escala menor
        // Card 2 (dir) → esquerda + baixo + gira CCW
        const EXITS = [
          e => ({ x:  e*220, y:  e*100, rot:  e*14, sc: 1-e*0.28 }),
          e => ({ x:  0,     y:  e*300, rot:  0,     sc: 1-e*0.35 }),
          e => ({ x: -e*220, y:  e*100, rot: -e*14, sc: 1-e*0.28 }),
        ];

        const update = () => {
          if (entered.size === 0) return;
          const rect = section.getBoundingClientRect();
          const scrolledPast = -rect.top;
          const exitStart = rect.height * 0.12;
          const exitRange = rect.height * 0.44;
          const t = Math.min(1, Math.max(0, (scrolledPast - exitStart) / exitRange));

          cards.forEach((card, i) => {
            if (!entered.has(card)) return;
            if (t > 0) {
              const e = t * t * (3 - 2 * t);
              const { x, y, rot, sc } = EXITS[i](e);
              const op = Math.max(0, 1 - e * 1.8);
              card.style.transform = `translateX(${x}px) translateY(${y}px) rotate(${rot}deg) scale(${sc})`;
              card.style.opacity   = String(op);
            } else {
              card.style.transform = 'none';
              card.style.opacity   = '1';
            }
          });
        };

        let raf = 0;
        const onScroll = () => { if (!raf) raf = requestAnimationFrame(() => { update(); raf = 0; }); };
        window.addEventListener('scroll', onScroll, { passive: true });
        update();
        return () => { entranceIO.disconnect(); window.removeEventListener('scroll', onScroll); };
      }, []);
    }

    function useStackParallax() {
      useEffect(() => {
        const section = document.getElementById('stack');
        if (!section) return;
        const cells = Array.from(section.querySelectorAll('.stack-cell'));
        if (cells.length === 0) return;

        // Inicial: invisível, fundo da página (aparência "transparente")
        cells.forEach(cell => { cell.style.opacity = '0'; });

        const entered = new Set();
        const grid = section.querySelector('.stack-grid') || section;

        // Entrada: fade simples por coluna — fundo permanece igual à página
        const entranceIO = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (!entry.isIntersecting) return;
            cells.forEach((cell, i) => {
              if (entered.has(cell)) return;
              entered.add(cell);
              setTimeout(() => {
                cell.style.transition = 'opacity 400ms cubic-bezier(0.22,0.61,0.36,1)';
                cell.style.opacity    = '1';
                setTimeout(() => { cell.style.transition = ''; cell.style.opacity = ''; }, 450);
              }, (i % 4) * 80);
            });
            entranceIO.disconnect();
          });
        }, { threshold: 0.05 });

        entranceIO.observe(grid);

        // Saída: "acende" (fundo offwhite→branco) + voa por linha + fade
        // Ao rolar de volta, fundo retorna transparente
        const update = () => {
          if (entered.size === 0) return;
          const rect = section.getBoundingClientRect();
          const scrolledPast = -rect.top;
          const exitStart = rect.height * 0.12;
          const exitRange = rect.height * 0.40;
          const t = Math.min(1, Math.max(0, (scrolledPast - exitStart) / exitRange));

          cells.forEach((cell, i) => {
            if (!entered.has(cell)) return;
            if (t > 0) {
              const e = t * t * (3 - 2 * t);
              // Acende: bg vai de offwhite → branco nos primeiros 30% da saída
              const litE = Math.min(1, e / 0.3);
              const r = Math.round(248 + 7  * litE);
              const g = Math.round(246 + 9  * litE);
              const b = Math.round(242 + 13 * litE);
              // Voa por linha (cima/baixo)
              const row = Math.floor(i / 4);
              const dir = row === 0 ? -1 : 1;
              const y   = dir * e * 280;
              const rot = dir * e * 9;
              const sc  = 1 - e * 0.22;
              // Fade começa só depois do acendimento (e > 0.5)
              const op  = Math.max(0, 1 - Math.max(0, e - 0.5) * 3);
              cell.style.transition = 'none';
              cell.style.background = `rgb(${r},${g},${b})`;
              cell.style.transform  = `translateY(${y}px) rotate(${rot}deg) scale(${sc})`;
              cell.style.opacity    = String(op);
            } else {
              // Restaura: limpa tudo → CSS retoma fundo da página
              cell.style.transition = '';
              cell.style.background = '';
              cell.style.transform  = '';
              cell.style.opacity    = '';
            }
          });
        };

        let raf = 0;
        const onScroll = () => { if (!raf) raf = requestAnimationFrame(() => { update(); raf = 0; }); };
        window.addEventListener('scroll', onScroll, { passive: true });
        update();
        return () => { entranceIO.disconnect(); window.removeEventListener('scroll', onScroll); };
      }, []);
    }

    // Números (Cases): a seção desliza por cima da Processo fixa (pin via
    // CSS sticky). Aqui só controlamos o BLUR do card: entra borrado,
    // foca conforme o card chega ao centro da tela, e sai nítido.
    function useNumbersCard() {
      useEffect(() => {
        const card = document.querySelector('.numbers-card');
        if (!card) return;

        const MAX_BLUR = 14;   // px de blur no início

        const update = () => {
          // Mobile (<=768px): pin desligado e o card é mais alto que a tela,
          // então o blur por centro não faz sentido → card sempre nítido.
          if (window.innerWidth <= 768) { card.style.filter = 'none'; return; }
          const r = card.getBoundingClientRect();
          const vh = window.innerHeight || document.documentElement.clientHeight;
          const center = r.top + r.height / 2;
          const startC = vh * 1.15;   // centro aqui (abaixo) → borrado
          const endC   = vh * 0.60;   // centro perto do meio → nítido
          let t = (startC - center) / (startC - endC);
          t = Math.min(1, Math.max(0, t));
          const e = t * t * (3 - 2 * t);          // smoothstep
          const blur = (1 - e) * MAX_BLUR;
          card.style.filter = blur > 0.06 ? `blur(${blur.toFixed(2)}px)` : 'none';
        };

        let raf = 0;
        const onScroll = () => { if (!raf) raf = requestAnimationFrame(() => { update(); raf = 0; }); };
        window.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('resize', onScroll, { passive: true });
        update();
        return () => {
          window.removeEventListener('scroll', onScroll);
          window.removeEventListener('resize', onScroll);
        };
      }, []);
    }

    // Saída em leque dos 3 cards da Cases quando a seção está saindo de
    // vista (card já passou do centro e sobe para fora). Reaproveita o
    // efeito antigo de leque (esq-baixo / cima / dir-baixo).
    function useCasesCardsExit() {
      useEffect(() => {
        const numCard = document.querySelector('.numbers-card');
        if (!numCard) return;
        const cards = Array.from(numCard.querySelectorAll('.case-card'));
        if (cards.length === 0) return;

        const EXITS = [
          e => ({ x: -e*340, y:  e*60,  rot: -e*13, sc: 1-e*0.24 }),
          e => ({ x:  0,     y: -e*300, rot:  e*5,  sc: 1-e*0.20 }),
          e => ({ x:  e*340, y:  e*60,  rot:  e*13, sc: 1-e*0.24 }),
        ];

        const update = () => {
          // Mobile (<=768px): cards empilhados em 1 coluna — o leque lateral
          // jogaria os cards pra fora da tela. Mantém tudo no lugar.
          if (window.innerWidth <= 768) {
            cards.forEach(c => { c.style.transform = ''; c.style.opacity = ''; c.style.transition = ''; });
            return;
          }
          const r = numCard.getBoundingClientRect();
          const vh = window.innerHeight || document.documentElement.clientHeight;
          const center = r.top + r.height / 2;
          const startC = vh * 0.45;    // card pouco acima do centro → começa a sair
          const endC   = vh * -0.15;   // card quase fora pelo topo → totalmente em leque
          let t = (startC - center) / (startC - endC);
          t = Math.min(1, Math.max(0, t));
          const e = t * t * (3 - 2 * t);

          cards.forEach((card, i) => {
            if (e > 0) {
              const f = EXITS[i] ? EXITS[i](e) : EXITS[0](e);
              card.style.transition = 'none';
              card.style.transform  = `translateX(${f.x}px) translateY(${f.y}px) rotate(${f.rot}deg) scale(${f.sc})`;
              card.style.opacity    = String(Math.max(0, 1 - e*1.8));
            } else {
              card.style.transform  = '';   // limpa inline → CSS (e :hover) assume
              card.style.opacity    = '';
              card.style.transition = '';
            }
          });
        };

        let raf = 0;
        const onScroll = () => { if (!raf) raf = requestAnimationFrame(() => { update(); raf = 0; }); };
        window.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('resize', onScroll, { passive: true });
        update();
        return () => {
          window.removeEventListener('scroll', onScroll);
          window.removeEventListener('resize', onScroll);
        };
      }, []);
    }

    function useProcessParallax() {
      useEffect(() => {
        const section = document.getElementById('processo');
        if (!section) return;
        const cards = Array.from(section.querySelectorAll('.process-step'));
        if (cards.length === 0) return;

        // Estado inicial: invisível
        cards.forEach(card => { card.style.opacity = '0'; card.style.transform = 'none'; });

        const entered = new Set();
        const grid = section.querySelector('.process-grid') || section;

        // Entrada: fade escalonado quando 20% do grid está visível
        const entranceIO = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (!entry.isIntersecting) return;
            cards.forEach((card, i) => {
              if (entered.has(card)) return;
              entered.add(card);
              setTimeout(() => {
                card.style.transition = 'opacity 600ms cubic-bezier(0.22,0.61,0.36,1)';
                card.style.opacity = '1';
                setTimeout(() => { card.style.transition = 'none'; }, 650);
              }, i * 100);
            });
            entranceIO.disconnect();
          });
        }, { threshold: 0.05 });

        entranceIO.observe(grid);

        // Saída: alternado cima/baixo. Como a Processo agora fica FIXA (pin),
        // o gatilho não é mais o scroll dela, e sim a chegada do card da Cases:
        // os cards "saem do caminho" quando o card está quase cobrindo o grid.
        const update = () => {
          if (entered.size === 0) return;
          const numCard = document.querySelector('.numbers-card');
          if (!numCard) return;
          const cardTop = numCard.getBoundingClientRect().top;
          const gr = grid.getBoundingClientRect();
          const startAt = gr.bottom + gr.height * 0.25;  // card quase chegando no grid
          const endAt   = gr.top;                        // card cobriu o grid
          const t = Math.min(1, Math.max(0, (startAt - cardTop) / (startAt - endAt)));

          cards.forEach((card, i) => {
            if (!entered.has(card)) return;
            if (t > 0) {
              const e = t * t * (3 - 2 * t);
              const dir = i % 2 === 0 ? -1 : 1; // par=cima, ímpar=baixo
              const y   = dir * e * 280;
              const rot = dir * e * 9;
              const sc  = 1 - e * 0.22;
              const op  = Math.max(0, 1 - e * 1.8);
              card.style.transform = `translateY(${y}px) rotate(${rot}deg) scale(${sc})`;
              card.style.opacity   = String(op);
            } else {
              card.style.transform = 'none';
              card.style.opacity   = '1';
            }
          });
        };

        let raf = 0;
        const onScroll = () => { if (!raf) raf = requestAnimationFrame(() => { update(); raf = 0; }); };
        window.addEventListener('scroll', onScroll, { passive: true });
        update();
        return () => { entranceIO.disconnect(); window.removeEventListener('scroll', onScroll); };
      }, []);
    }

    function useServiceCardParallax() {
      useEffect(() => {
        const section = document.getElementById('servicos');
        if (!section) return;
        const leftCard  = section.querySelector('[data-exit="left"]');
        const rightCard = section.querySelector('[data-exit="right"]');
        if (!leftCard && !rightCard) return;

        // Estado inicial: invisível, sem deslocamento lateral (entrada é só fade)
        if (leftCard)  { leftCard.style.opacity  = '0'; leftCard.style.transform = 'none'; }
        if (rightCard) { rightCard.style.opacity = '0'; rightCard.style.transform = 'none'; }

        const entered = new Set();

        // Entrada: fade simples quando 65% do card está visível
        const entranceIO = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (!entry.isIntersecting || entered.has(entry.target)) return;
            const card = entry.target;
            entered.add(card);
            const delay = card === leftCard ? 0 : 180;
            setTimeout(() => {
              card.style.transition = 'opacity 700ms cubic-bezier(0.22,0.61,0.36,1)';
              card.style.opacity    = '1';
              setTimeout(() => { card.style.transition = 'none'; }, 750);
            }, delay);
            entranceIO.unobserve(card);
          });
        }, { threshold: 0.65 });

        if (leftCard)  entranceIO.observe(leftCard);
        if (rightCard) entranceIO.observe(rightCard);

        // Saída: inicia só após 40% da seção ter saído pelo topo (evita saída prematura)
        const update = () => {
          if (entered.size === 0) return;
          const rect = section.getBoundingClientRect();
          const scrolledPast = -rect.top;
          const exitStart = rect.height * 0.40;
          const exitRange = rect.height * 0.42;
          const t = Math.min(1, Math.max(0, (scrolledPast - exitStart) / exitRange));

          if (t > 0) {
            const e = t * t * (3 - 2 * t);
            const x = e * 360, y = e * 60, rot = e * 13;
            const sc = 1 - e * 0.24, op = Math.max(0, 1 - e * 1.8);
            if (leftCard && entered.has(leftCard)) {
              leftCard.style.transform  = `translateX(${-x}px) translateY(${y}px) rotate(${-rot}deg) scale(${sc})`;
              leftCard.style.opacity    = String(op);
            }
            if (rightCard && entered.has(rightCard)) {
              rightCard.style.transform  = `translateX(${x}px) translateY(${y}px) rotate(${rot}deg) scale(${sc})`;
              rightCard.style.opacity    = String(op);
            }
          } else {
            if (leftCard  && entered.has(leftCard))  { leftCard.style.transform  = 'none'; leftCard.style.opacity  = '1'; }
            if (rightCard && entered.has(rightCard)) { rightCard.style.transform = 'none'; rightCard.style.opacity = '1'; }
          }
        };

        let raf = 0;
        const onScroll = () => { if (!raf) raf = requestAnimationFrame(() => { update(); raf = 0; }); };
        window.addEventListener('scroll', onScroll, { passive: true });
        update();
        return () => { entranceIO.disconnect(); window.removeEventListener('scroll', onScroll); };
      }, []);
    }

    function ScrollProgress() {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current; if (!el) return;
        const onScroll = () => {

          const max = h.scrollHeight - h.clientHeight;
          el.style.width = `${max > 0 ? (h.scrollTop / max) * 100 : 0}%`;
        };
        onScroll();

      return <div ref={ref} className="scroll-progress" aria-hidden="true" />;

    function SplitWords({ children, perWordDelay = 60, baseDelay = 0, as: As = 'span', className = '', ...rest }) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current; if (!el) return;
        const io = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) {
            el.classList.add('is-visible');
            io.disconnect();
          }
        }, { threshold: 0.2, rootMargin: '0px 0px -10% 0px' });
        io.observe(el);
        return () => io.disconnect();
      }, []);
      let idx = 0;
      const renderNode = (node, key) => {
        if (typeof node === 'string') {
          return node.split(/(\s+)/).map((w, i) => {
            if (w === '') return null;
            if (/^\s+$/.test(w)) return w;
            idx++;
            return <span key={`${key}-${i}`} className="word" style={{ transitionDelay: `${baseDelay + idx * perWordDelay}ms` }}>{w}</span>;
          });
        }
        if (React.isValidElement(node)) {
          return React.cloneElement(node, { key }, renderNode(node.props.children, `${key}-c`));
        }
        if (Array.isArray(node)) return node.map((n, i) => renderNode(n, `${key}-${i}`));
        return node;
      };
      return <As ref={ref} className={`split-words ${className}`} {...rest}>{renderNode(children, 'w')}</As>;
    }

    function Hero({ tweaks }) {
      const videoARef = useRef(null);

      useEffect(() => {
        const a = videoARef.current, b = videoBRef.current;
        if (!a || !b || (tweaks && tweaks.cinematic === 'off')) return;
        const CROSSFADE = 0.6;
        let rafId, started = false, front = a, back = b;
        const playSafely = (v) => { const p = v.play(); if (p && p.catch) p.catch(() => {}); };
        const swapRoles = () => { const tmp = front; front = back; back = tmp; };
        const tick = () => {
          const dur = front.duration, t = front.currentTime;
          if (Number.isFinite(dur) && dur > 0) {
            if (!started) {
              front.style.opacity = t < CROSSFADE ? Math.max(0, t / CROSSFADE).toFixed(3) : '1';
              if (t >= CROSSFADE) started = true;
            }
            if (dur - t <= CROSSFADE && back.paused) { back.currentTime = 0; playSafely(back); }
            if (dur - t <= CROSSFADE) {
              const k = Math.max(0, (dur - t) / CROSSFADE);
              front.style.opacity = k.toFixed(3); back.style.opacity = (1 - k).toFixed(3);
            } else if (started) { front.style.opacity = '1'; }
          }
          rafId = requestAnimationFrame(tick);
        };
        const onEnded = (which) => () => {
          if (front !== which) return;
          front.style.opacity = '0'; try { front.pause(); front.currentTime = 0; } catch(e) {}
          swapRoles(); front.style.opacity = '1';
          if (front.paused) playSafely(front);
        };
        [a, b].forEach(v => { v.muted = true; v.playsInline = true; v.style.opacity = '0'; });
        a.classList.add('is-active');
        a.addEventListener('ended', onEnded(a));
        b.addEventListener('ended', onEnded(b));
        playSafely(a);
        rafId = requestAnimationFrame(tick);
        return () => { cancelAnimationFrame(rafId); try { a.pause(); b.pause(); } catch(e) {} };
      }, [tweaks && tweaks.cinematic]);

      const videoSrc = "https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260306_074215_04640ca7-042c-45d6-bb56-58b1e8a42489.mp4";

    // ============================================================
    // CTA Final
    // ============================================================
    function CTAFinal({ tweaks }) {
      const videoRef = useRef(null);
      const [status, setStatus] = useState('');
      const [submitting, setSubmitting] = useState(false);

      useEffect(() => {
        const video = videoRef.current;
        if (!video || (tweaks && tweaks.cinematic === 'off')) return;
        const src = 'https://stream.mux.com/NcU3HlHeF7CUL86azTTzpy3Tlb00d6iF3BmCdFslMJYM.m3u8';
        const play = () => { const p = video.play(); if (p && p.catch) p.catch(() => {}); };
        if (video.canPlayType('application/vnd.apple.mpegurl')) { video.src = src; play(); return; }
        let hls;
        const load = () => new Promise((res,rej) => {
          if (window.Hls) return res(window.Hls);
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js';
          s.onload = () => res(window.Hls); s.onerror = rej;
          document.head.appendChild(s);
        });
        load().then(Hls => {
          if (!videoRef.current) return;
          if (Hls && Hls.isSupported && Hls.isSupported()) {
            hls = new Hls(); hls.loadSource(src); hls.attachMedia(videoRef.current);
            hls.on(Hls.Events.MANIFEST_PARSED, () => play());
          } else { videoRef.current.src = src; play(); }
        }).catch(() => {});
        return () => { try { hls && hls.destroy(); } catch(e) {} };
      }, [tweaks && tweaks.cinematic]);

      const onSubmit = (e) => {
        e.preventDefault(); if (submitting) return;
        setSubmitting(true); setStatus('Enviando…');
        setTimeout(() => { setStatus('Recebemos. Respondemos em até 1 dia útil.'); setSubmitting(false); e.target.reset(); }, 900);
      };

      return (
        <section className="cta-final" id="contato">

            <video ref={videoRef} className="cta-final-video" muted playsInline autoPlay loop preload="auto" />

                </p>
              </div>

                <div className="row">
                  <div className="field"><label htmlFor="cf-name">Nome</label><input id="cf-name" name="name" required placeholder="Seu nome"/></div>
                  <div className="field"><label htmlFor="cf-email">E-mail</label><input id="cf-email" type="email" name="email" required placeholder="voce@empresa.com"/></div>
                </div>
                <div className="row">
                  <div className="field"><label htmlFor="cf-company">Empresa</label><input id="cf-company" name="company" placeholder="Nome da empresa"/></div>
                  <div className="field">
                    <label htmlFor="cf-invest">Investimento mensal</label>
                    <select id="cf-invest" name="invest" defaultValue="">
                      <option value="" disabled>Selecione</option>
                      <option>Até R$ 5k</option>
                      <option>R$ 5k — R$ 15k</option>
                      <option>R$ 15k — R$ 50k</option>
                      <option>Acima de R$ 50k</option>
                    </select>
                  </div>
                </div>
                <div className="field">
                  <label htmlFor="cf-msg">Conta um pouco do projeto</label>
                  <textarea id="cf-msg" name="msg" rows="3" placeholder="O que está rodando hoje e onde dói mais"/>
                </div>
                <div className="form-status">{status}</div>
                <div className="submit">
                  <button type="submit" className="btn primary" disabled={submitting}>
                    {submitting ? 'Enviando…' : 'Pedir diagnóstico'}
                    <span className="btn-arrow"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7h12M8 2l5 5-5 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg></span>
                  </button>
                  <a className="wa" href="https://wa.me/5511999999999?text=Oi%20Norte%2C%20quero%20um%20diagn%C3%B3stico." target="_blank" rel="noopener noreferrer">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 21l1.5-4.5a8.5 8.5 0 1 1 3 3L3 21z" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round"/><path d="M9 10c.5 2 1.5 3 3.5 4.5.5.3 1 .5 1.5.3.4-.2.7-.6 1-1 .2-.3.2-.7-.1-1L14 12c-.3-.2-.7-.2-1 0l-.4.3c-.8-.4-1.4-1-1.8-1.8l.3-.4c.2-.3.2-.7 0-1L10 8c-.3-.3-.7-.3-1-.1-.4.3-.8.6-1 1-.2.5 0 1 .1 1.5z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/></svg>
                    WhatsApp
                  </a>
                </div>
              </form>
            </div>
          </div>
        </section>
      );
    }
